name: Build NyxAssets

on:
  push:
    branches:
      - main
      - master
    paths:
      - NyxAssets/**
      - Directory.Build.props
      - .github/workflows/build-nyxassets.yml
      - .github/workflows/deploy-nyxassets.yml
  pull_request:
    paths:
      - NyxAssets/**
      - Directory.Build.props
      - .github/workflows/build-nyxassets.yml
      - .github/workflows/deploy-nyxassets.yml

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Test
        run: dotnet test NyxAssets/Tests/NyxAssets.Tests.csproj -c Release --verbosity minimal

      - name: Pack (verify)
        run: dotnet pack NyxAssets/NyxAssets.csproj -c Release -o ./artifacts/nuget
